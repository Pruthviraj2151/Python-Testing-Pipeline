[tool:pytest]
testpaths = tests
addopts =
    --tb=short
    --strict-markers
    -q
    --cov=app
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-report=xml:reports/coverage/coverage.xml
    --html=reports/html/report.html
    --self-contained-html
    --junitxml=reports/junit/junit.xml

markers =
    slow: marks tests as slow
    integration: marks tests as integration tests

[coverage:run]
source = app
omit =
    */tests/*
    */__init__.py

[coverage:report]
fail_under = 80
show_missing = true

[flake8]
max-line-length = 120
exclude = .git,__pycache__,reports,venv,.venv
ignore = E501,W503
